<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

{% extends "base.html" %}
{% block title %}Dress Recommendation{% endblock %}
{% block content %}
<div class="form-group">
<div class="card">
  <h2>✨Your Outfit Recommendation</h2>
  <p>Select recommendation type and fill details:</p>

  <div class="button-grid">
    <button type="button" class="link-button" id="btnDirect">Direct</button><br><br>
  </div>

  <form id="recForm" action="{{ url_for('recommend') }}" method="post" enctype="multipart/form-data">
    <label>Gender</label>
    <select name="gender">
      <option>Female</option>
      <option>Male</option>
    </select>

    <label>Age</label>
    <input type="number" name="age" min="1" max="100" required>
    <label>Body Type</label>
    <select name="body_type">
      <option value="">Select</option>
      <option value="Pear" {% if body_type=='Pear' %}selected{% endif %}>Pear</option>
      <option value="Apple" {% if body_type=='Apple' %}selected{% endif %}>Apple</option>
      <option value="Rectangle" {% if body_type=='Rectangle' %}selected{% endif %}>Rectangle</option>
      <option value="Hourglass" {% if body_type=='Hourglass' %}selected{% endif %}>Hourglass</option>
      <option value="Triangle" {% if body_type=='Triangle' %}selected{% endif %}>Triangle</option>
    </select>

    <label>Weather</label>
    <select name="weather">
      <option>Summer</option>
      <option>Winter</option>
      <option>Mild</option>
    </select>

    <label>Occasion</label>
    <select name="occasion">
      <option>Casual</option>
      <option>Party</option>
      <option>Office</option>
      <option>College</option>
    </select>

  <div class="checkbox-group" id="categorySection">
    <h3>What do you want me to recommend?</h3>

    <label>
    <input type="checkbox" id="catTop" name="wanted_category[]" value="Top"> Top</label>

    <label>
    <input type="checkbox" id="catBottom" name="wanted_category[]" value="Bottom"> Bottom</label>

    <label>
    <input type="checkbox" id="catDress" name="wanted_category[]" value="Dress"> Dress</label>

</div>
    
    <label>Color (if you have any preferences)</label>
    <input type="text" name="color">

    <button type="submit">Get Recommendation</button>
  </form>

  <a class="link-button" href="{{ url_for('home') }}"> Go Back</a>
</div>
</div>

<script>
  const btnDirect = document.getElementById('btnDirect');
  const categorySection = document.getElementById('categorySection');

  btnDirect.addEventListener('click', () => {
    wardSection.style.display = 'none';
    categorySection.style.display = 'block';
    useWard.value = 'no';
  });

  const chkTop = document.getElementById('catTop');
  const chkBottom = document.getElementById('catBottom');
  const chkDress = document.getElementById('catDress');

  function updateCategoryStates(changed) {
    if (chkDress.checked) {
      chkTop.checked = false;
      chkBottom.checked = false;
      return;
    }
    // if top or bottom selected, uncheck dress
    if (chkTop.checked || chkBottom.checked) {
      chkDress.checked = false;
    }
  }

  [chkTop, chkBottom, chkDress].forEach(cb => cb.addEventListener('change', updateCategoryStates));
</script>
{% endblock %}
