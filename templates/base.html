<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block title %}VestileFit{% endblock %}</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#F1EADA,#CEC1A8);
min-height:100vh;  
padding-top:40px;         
overflow-y:auto;          
}

.quote{
text-align:center;
font-style:italic;
color:#5a5a5a;
margin-top:10px;
font-size:14px;
}

/* Main container */
.container{
width:520px;
margin:auto;
margin-top: 40px;
}

/* Main card */
.card{
background:linear-gradient(135deg,#D9CBB5,#C7B59A);
padding:35px;
border-radius:22px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

/* Titles */
h1{
margin:0;
font-size:32px;
color:#2d2d2d;
}

h2{
margin-bottom:15px;
color:#3b3b3b;
}

.small{
color:#555;
font-size:14px;
}

/* Menu cards */
.menu{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

.menu-card{
width:130px;
background:white;
padding:25px 15px;
border-radius:18px;
text-decoration:none;
color:#333;
font-weight:500;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
transition:0.3s;
}

.menu-card:hover{
transform:translateY(-6px);
box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

.menu-card p{
margin-top:10px;
font-size:14px;
}

/* Inputs */
label{
display:block;
text-align:left;
margin-top:12px;
font-size:14px;
font-weight:500;
}

input,select{
width:100%;
padding:11px;
margin-top:6px;
border-radius:10px;
border:1px solid #ccc;
font-size:14px;
}

input:focus{
outline:none;
border-color:#B89E7A;
}

/* Button */
button{
width:100%;
margin-top:15px;
padding:13px;
border:none;
border-radius:12px;
background:#A78B6D;
color:white;
font-size:15px;
font-weight:500;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#7A634D;
}

/* Alert */
.alert{
background:#f5efe6;
padding:10px;
border-radius:10px;
margin-bottom:15px;
font-size:14px;
}

/* Footer */
footer{
margin-top:20px;
text-align:center;
font-size:13px;
color:#666;
}

</style>
</head>
<body>
<div class="container">
    {% block content %}{% endblock %}
</div>
 <footer>&copy; VestileFit</footer>
</body>
</html>
